<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You | Sonic Focus</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
    h1 { color: #0a192f; }
    p { color: #333; font-size: 1.2rem; }
    .highlight { color: #64ffda; font-weight: bold; }
  </style>

  <script>
    // Grab query parameters from the URL
    //const params = new URLSearchParams(window.location.search);
    const company = localStorage.get("company");

    // Inject the company name if available
    if (company) {
      document.getElementById("companyName").textContent = company;
    } else {
      document.getElementById("companyName").textContent = "your company";
    }
  </script>  
</head>
<body>
  <h1>Thank You!</h1>
  <p>
    We’ve received your enquiry from 
    <span id="companyName" class="highlight"></span>.
  </p>
  <p>Our team will respond within 4 business hours.</p>

</body>
</html>
